services:
  postgres:
    image: postgres:16-alpine
    container_name: cbe-banking-db
    environment:
      POSTGRES_DB: banking_system
      POSTGRES_USER: cbe_user
      POSTGRES_PASSWORD: cbe_password
    ports:
      - "5432:5432"
    volumes:
      - psql_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cbe-banking-redis
    ports:
      - "6379:6379"

volumes:
  psql_data:
